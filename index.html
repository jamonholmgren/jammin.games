    <div class="hero hero--splash">
      <img
        class="hero-bg"
        src="assets/images/into-the-dawn-splash.jpg?v=0.3"
        alt=""
        width="1920"
        height="1080"
        fetchpriority="high"
      />
      <div class="hero-stack">
        <div class="hero-content hero-content--splash">
          <h1 class="hero-title">Jammin Games</h1>
          <p class="hero-tagline">
            <span class="hero-game-note"
              >Announcing Gunship Origins, published by MicroProse!</span
            >
          </p>
          <p class="hero-brand-row">
            <a href="/gunship-origins" class="hero-eyebrow-game-link"
              ><img
                class="hero-eyebrow-game-logo"
                src="assets/images/logo-gunship-origins.png"
                width="1000"
                height="333"
                alt="Gunship Origins"
                decoding="async"
            /></a>
            <span class="hero-eyebrow-sep" aria-hidden="true">·</span>
            <a
              href="https://www.microprose.com/"
              target="_blank"
              rel="noopener noreferrer"
              class="hero-microprose-link"
              ><img
                src="assets/images/microprose-logo.svg"
                alt="MicroProse"
                width="200"
                height="29"
                class="microprose-logo microprose-logo--hero"
                decoding="async"
            /></a>
          </p>
          <div class="hero-actions">
            <a class="hero-cta hero-cta--primary" href="/gunship-origins"
              >See the game</a
            >
            <a

              href="https://store.steampowered.com/app/4055780/"
              target="_blank"
              rel="noopener noreferrer"
              >Wishlist it on Steam</a

          </div>
        </div>

          aria-label="Gunship Origins screenshots"

                height="1080"

            <a class="home-shot" href="/gunship-origins"

            /></a>

    <script>
      document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
        anchor.addEventListener("click", function (e) {
          e.preventDefault();
          const target = document.querySelector(this.getAttribute("href"));
          if (target) {
            target.scrollIntoView({
              behavior: "smooth",
              block: "start",
            });
          }
        });
      });
    </script>
